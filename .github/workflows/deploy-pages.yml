name: Deploy GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Verify maven-repo artifact
        run: |
          test -f maven-repo/index.html || (echo "ERROR: maven-repo/index.html missing" && exit 1)
          test -f maven-repo/versions.json || (echo "ERROR: maven-repo/versions.json missing" && exit 1)

      - name: Sync catalog to repo root
        run: chmod +x scripts/sync-pages-root.sh && ./scripts/sync-pages-root.sh

      - name: Commit Pages site to master root
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html versions.json .nojekyll
          if git diff --cached --quiet; then
            echo "Pages root already up to date"
          else
            git commit -m "Sync Pages catalog to repo root [skip ci]"
            git push origin master
          fi
