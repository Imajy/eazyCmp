name: Deploy GitHub Pages

on:
  push:
    branches:
      - master
    paths:
      - 'maven-repo/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Verify maven-repo artifact
        run: |
          echo "Files in maven-repo:"
          ls -la maven-repo/ | head -20
          test -f maven-repo/index.html || (echo "ERROR: maven-repo/index.html missing" && exit 1)
          test -f maven-repo/versions.json || (echo "ERROR: maven-repo/versions.json missing" && exit 1)
          test -f maven-repo/.nojekyll || touch maven-repo/.nojekyll

      - name: Deploy catalog to gh-pages branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: maven-repo
          branch: gh-pages
          clean: true
          single-commit: true
          commit-message: Deploy Maven catalog (${{ github.sha }})
