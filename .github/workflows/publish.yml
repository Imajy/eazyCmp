name: Publish Multiplatform Artifacts

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "value=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "source=tag" >> "$GITHUB_OUTPUT"
          else
            echo "value=$(python3 scripts/version.py current)" >> "$GITHUB_OUTPUT"
            echo "source=version.properties" >> "$GITHUB_OUTPUT"
          fi
          python3 scripts/version.py validate

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish Android, iOS and JVM artifacts
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          chmod +x gradlew
          ./gradlew publishAllPublicationsToMavenRepository --no-daemon

      - name: Collect release metadata
        id: meta
        if: github.ref_type == 'tag'
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          {
            echo "message<<EOF"
            git log -1 --format=%B "$VERSION" | sed '/^$/d' | head -n 5
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "published_at=$(git log -1 --format=%cI "$VERSION")" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse "$VERSION^{commit}")" >> "$GITHUB_OUTPUT"

      - name: Update version manifest and Pages index
        env:
          VERSION: ${{ steps.version.outputs.value }}
          RELEASE_MESSAGE: ${{ steps.meta.outputs.message }}
          PUBLISHED_AT: ${{ steps.meta.outputs.published_at }}
          RELEASE_COMMIT: ${{ steps.meta.outputs.commit }}
        run: |
          python3 scripts/update-version-manifest.py \
            --manifest maven-repo/versions.json \
            --version "$VERSION" \
            --message "$RELEASE_MESSAGE" \
            --published-at "$PUBLISHED_AT" \
            --commit "$RELEASE_COMMIT"

      - name: Commit maven-repo and bump next version
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            cp -r maven-repo /tmp/eazycmp-maven-repo
            git fetch origin master
            git checkout master
            git pull origin master
            mkdir -p maven-repo
            rsync -a /tmp/eazycmp-maven-repo/ maven-repo/
          fi

          git add maven-repo/

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            CURRENT=$(python3 scripts/version.py current)
            if [[ "$CURRENT" == "$VERSION" ]]; then
              python3 scripts/version.py bump
              git add version.properties shared/src/commonMain/kotlin/com/aj/shared/internal/EazyCmpBuildInfo.kt
            fi
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            NEXT=$(python3 scripts/version.py current)
            git commit -m "Publish EazyCmp $VERSION · next $NEXT"
            git push origin master
          fi
