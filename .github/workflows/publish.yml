name: Publish Multiplatform Artifacts

on:
  push:
    branches:
      - master

permissions:
  contents: write
  actions: write

concurrency:
  group: publish-master
  cancel-in-progress: false

jobs:
  publish:
    if: >-
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !startsWith(github.event.head_commit.message, 'Publish EazyCmp') &&
      !startsWith(github.event.head_commit.message, 'Sync Pages catalog')
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release version
        id: version
        run: |
          echo "value=$(python3 scripts/version.py current)" >> "$GITHUB_OUTPUT"
          python3 scripts/version.py validate

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'oracle'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish Android, iOS and JVM artifacts
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.value }}
        run: |
          chmod +x gradlew
          ./gradlew publishAllPublicationsToMavenRepository --no-daemon

      - name: Collect release metadata
        id: meta
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          {
            echo "message<<EOF"
            git log -1 --format=%B | sed '/^$/d' | head -n 5
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "published_at=$(git log -1 --format=%cI HEAD)" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Update version manifest and Pages index
        env:
          VERSION: ${{ steps.version.outputs.value }}
          RELEASE_MESSAGE: ${{ steps.meta.outputs.message }}
          PUBLISHED_AT: ${{ steps.meta.outputs.published_at }}
          RELEASE_COMMIT: ${{ steps.meta.outputs.commit }}
        run: |
          python3 scripts/update-version-manifest.py \
            --manifest maven-repo/versions.json \
            --version "$VERSION" \
            --message "$RELEASE_MESSAGE" \
            --published-at "$PUBLISHED_AT" \
            --commit "$RELEASE_COMMIT"
          chmod +x scripts/sync-pages-root.sh
          ./scripts/sync-pages-root.sh

      - name: Commit published artifacts and bump next version
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          python3 scripts/version.py bump
          NEXT=$(python3 scripts/version.py current)

          BUILD_INFO="shared/src/commonMain/kotlin/com/aj/shared/internal/EazyCmpBuildInfo.kt"
          mkdir -p "$(dirname "$BUILD_INFO")"
          {
            echo "package com.aj.shared.internal"
            echo ""
            echo "internal object EazyCmpBuildInfo {"
            echo "    const val VERSION: String = \"$NEXT\""
            echo "}"
          } > "$BUILD_INFO"

          git add maven-repo/ index.html versions.json .nojekyll version.properties \
            shared/src/commonMain/kotlin/com/aj/shared/internal/EazyCmpBuildInfo.kt

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Publish EazyCmp $VERSION · next $NEXT [skip ci]"
            git push origin master
          fi
