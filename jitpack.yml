# JitPack fast-build profile (Linux VM) — target ~3-6 min
# iOS native compile skipped on JitPack; iOS apps build klib locally via Xcode.
jdk:
  - openjdk17
env:
  EAZYCMP_SKIP_IOS: "true"
  GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8"
install:
  - ./gradlew :shared:publishToMavenLocal
      -x :shared:lint
      -x :shared:lintAnalyze
      -x :shared:lintReport
      --parallel
      --build-cache
      --no-scan
